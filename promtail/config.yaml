server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: ${LOKI_URL}/loki/api/v1/push
    bearer_token: ${LOKI_BEARER_TOKEN}
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    timeout: 10s
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # 普通日志（info/warn/debug）：oneapi-YYYYMMDD.log
  # 包含两类 JSON 行：
  #   应用日志: {"ts","level","request_id","msg","service","instance"}
  #   访问日志: {"ts","level","request_id","msg","status","latency_ms","client_ip","method","path","service","instance"}
  - job_name: one-api-general
    static_configs:
      - targets:
          - localhost
        labels:
          job: ${APP_NAME}
          instance: ${SITE_IP}
          stream: general
          __path__: /var/log/app/oneapi-[0-9]*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: ts
            # 以下字段仅访问日志有，应用日志中为空，均通过 | json 查询，不做 label
            # status / method / path / latency_ms / client_ip / request_id / msg
      - labels:
          level:       # 低基数（info/warn/error/debug），适合做 label
      - timestamp:
          source: ts
          format: RFC3339Nano
          fallback_formats:
            - RFC3339

  # 错误日志（error/fatal）：oneapi-error-YYYYMMDD.log
  - job_name: one-api-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: ${APP_NAME}
          instance: ${SITE_IP}
          stream: error
          __path__: /var/log/app/oneapi-error-*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            ts: ts
      - labels:
          level:
      - timestamp:
          source: ts
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
